<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <body>
    <form class="form2" method="post">
      <header>
        <h1>Create</h1>
        <p>Please complete all fields below</p>
      </header>
      <div class="field">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Sadman Saif" />
      </div>
      <div class="field">
        <label for="postal">Postal Code</label>
        <input type="number" id="number" name="number" placeholder="3201" />
      </div>
      <div class="field">
        <label for="dob">Date of Birth</label>
        <input type="date" id="date" name="date" placeholder="03/01/2026" />
      </div>
      <div class="field">
        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="sadmansaif@gmail.com"
        />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="......"
        />
      </div>
      <div class="field">
        <label for="country">Country</label>
        <select id="country" name="country">
          <option>Select a Country</option>
          <option>Bangladesh</option>
          <option>Nepal</option>
          <option>Pakistan</option>
        </select>
      </div>
      <div class="button">
        <button type="submit" class="button-1">Submit</button>
        <button type="reset" class="button-2">Reset</button>
      </div>
    </form>
  </body>
</html>
