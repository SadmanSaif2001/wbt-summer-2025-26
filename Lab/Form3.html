<!doctype html>
<html>
  <head>
    <title>Create Your Account</title>
  </head>

  <body>
    <div class="container">
      <div class="heading">
        <h1>Create your account</h1>
        <p>Join us in a couple of steps.</p>
      </div>

      <form>
        <div class="name">
          <label for="name">Full name</label><br />
          <input type="text" id="name" placeholder="khandaker Sadman Saif" />
        </div>

        <div class="age">
          <label for="age">Age</label><br />
          <input type="number" id="age" placeholder="25" />
        </div>

        <div class="dob">
          <label for="dob">Date of birth</label><br />
          <input type="date" id="dob" />
        </div>

        <div class="email">
          <label for="email">Email address</label><br />
          <input
            type="email"
            id="email"
            placeholder="sadmansaif102030@gmail.com"
          />
        </div>

        <div class="password">
          <label for="password">Password</label><br />
          <input type="password" id="password" placeholder="********" />
        </div>

        <div class="contact">
          <label>Preferred contact</label><br />

          <input type="radio" id="email_contact" name="contact" checked />
          <label for="email_contact">Email</label>

          <input type="radio" id="phone_contact" name="contact" />
          <label for="phone_contact">Phone</label>

          <input type="radio" id="sms_contact" name="contact" />
          <label for="sms_contact">SMS</label>
        </div>
        <br />
        <div class="buttons">
          <button type="submit">Submit</button>
          <button type="reset">Reset</button>
        </div>
      </form>
    </div>
  </body>
</html>
